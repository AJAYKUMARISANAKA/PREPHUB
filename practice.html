<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PrepHub - Practice</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <!-- CodeMirror for code editor -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/dracula.min.css">
</head>
<body>
    <!-- Coding Practice Layout -->
    <div id="codingLayout" class="practice-layout hidden">
        <!-- Top Bar -->
        <div class="practice-topbar">
            <div class="flex items-center gap-4">
                <a href="index.html" class="text-white hover:text-indigo-400 transition-colors">
                    <i class="fas fa-graduation-cap text-2xl"></i>
                </a>
                <span class="text-gray-400">|</span>
                <div class="flex items-center gap-2">
                    <i class="fas fa-clock text-indigo-400"></i>
                    <span id="codingTimer" class="text-white font-mono text-xl">60:00</span>
                </div>
            </div>
            
            <!-- Question Numbers -->
            <div id="questionNumbers" class="flex gap-2">
                <!-- Dynamically generated -->
            </div>
            
            <button onclick="finishCodingPractice()" class="btn-danger px-6 py-2 rounded-lg">
                <i class="fas fa-flag-checkered mr-2"></i>Finish
            </button>
        </div>

        <!-- Main Content -->
        <div class="coding-main">
            <!-- Left Panel - Question -->
            <div class="coding-left">
                <div class="question-header">
                    <span id="currentQuestionNum" class="text-indigo-400 font-semibold">Question 1</span>
                    <span id="questionDifficulty" class="difficulty-badge easy">Easy</span>
                </div>
                <h3 id="questionTitle" class="text-xl font-bold text-white mb-4">Two Sum</h3>
                <div id="questionDescription" class="text-gray-300 mb-6">
                    <!-- Question description here -->
                </div>
                
                <div class="sample-testcases">
                    <h4 class="text-white font-semibold mb-3">Sample Test Cases</h4>
                    <div id="sampleTestCases" class="space-y-3">
                        <!-- Test cases here -->
                    </div>
                </div>
            </div>

            <!-- Right Panel - Editor -->
            <div class="coding-right">
                <div class="editor-header">
                    <select id="languageSelect" class="language-select" onchange="changeLanguage()">
                        <option value="python">Python</option>
                        <option value="javascript">JavaScript</option>
                        <option value="java">Java</option>
                        <option value="cpp">C++</option>
                    </select>
                    <button onclick="saveCode()" class="btn-save">
                        <i class="fas fa-save mr-2"></i>Save
                    </button>
                </div>
                
                <div id="codeEditor" class="code-editor"></div>
                
                <div class="editor-actions">
                    <button onclick="runCode()" class="btn-run">
                        <i class="fas fa-play mr-2"></i>Run
                    </button>
                    <button onclick="submitCode()" class="btn-submit">
                        <i class="fas fa-paper-plane mr-2"></i>Submit
                    </button>
                </div>
                
                <div class="output-section">
                    <h4 class="text-white font-semibold mb-3">Output</h4>
                    <div id="codeOutput" class="output-box">
                        <p class="text-gray-400">Run your code to see output...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- MCQ Practice Layout (CS Fundamentals / Aptitude) -->
    <div id="mcqLayout" class="practice-layout hidden">
        <!-- Top Bar -->
        <div class="mcq-topbar">
            <!-- Question Numbers Scrollable -->
            <div class="mcq-questions-scroll ">
                <div id="mcqQuestionNumbers" class="flex gap-2">
                    <!-- Dynamically generated -->
                </div>
            </div>

            <div class="flex items-center gap-4">
                <div class="flex items-center gap-2">
                    <i class="fas fa-clock text-orange-400"></i>
                    <span id="mcqTimer" class="text-white font-mono text-2xl">30</span>
                </div>
            </div>
        </div>

        <!-- Question Content -->
        <div class="mcq-content">
            <div class="mcq-question-card">
                <div class="question-number-badge mt-4 mb-9 text-white text-2xl">
                    <span id="mcqCurrentNum">1</span> / <span id="mcqTotalNum">20</span>
                </div>
                
                <h3 id="mcqQuestionText" class="text-xl text-white mb-6">
                    What is the time complexity of binary search?
                </h3>

                <div id="mcqOptions" class="options-grid text-white">
                    <!-- Options dynamically generated -->
                </div>
            </div>

            <button id="mcqSubmitBtn" onclick="submitMCQAnswer()" class="btn-primary w-full max-w-md mx-auto py-4 mt-6">
                <i class="fas fa-arrow-right mr-2"></i>Submit
            </button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/python/python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/javascript/javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/clike/clike.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
